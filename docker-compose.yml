services:
  backend:
    build:
      context: ./backend

    container_name: app_backend
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 5000

      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: aplikasi_booking
      DB_USER: nidarahma
      DB_PASSWORD: soupkatak

      JWT_SECRET: rahasia

    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend

    container_name: app_frontend
    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      - backend

volumes:
  mysql_data:
