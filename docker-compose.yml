services:
  backend:
    build:
      context: ./backend
    container_name: app_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: aplikasi_booking
      DB_USER: nidarahma
      DB_PASSWORD: soupkatak
      JWT_SECRET: apa_saja_yang_penting_rahasia_123
    ports:
      - "3000:5000"
    depends_on:
      - mysql
    networks:
      - my-network

  frontend:
    build:
      context: ./frontend
    container_name: app_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - my-network

volumes:
  mysql_data:

networks:
  my-network:
    name: my-network
